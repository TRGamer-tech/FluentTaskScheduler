PackageIdentifier: TRGamer-tech.FluentTaskScheduler
PackageVersion: 1.8.0
MinimumOSVersion: "10.0.17763.0"
InstallerType: msi
InstallModes:
  - interactive
  - silent
InstallerSwitches:
  Silent: /qn
  SilentWithProgress: /qb
  Log: /log "$TEMP\FluentTaskScheduler-Install.log"
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/TRGamer-tech/FluentTaskScheduler/releases/download/v1.8.0/Setup-x64.msi
    InstallerSha256: <SHA256_OF_Setup-x64.msi>
  - Architecture: arm64
    InstallerUrl: https://github.com/TRGamer-tech/FluentTaskScheduler/releases/download/v1.8.0/Setup-arm64.msi
    InstallerSha256: <SHA256_OF_Setup-arm64.msi>
ManifestType: installer
ManifestVersion: 1.6.0
